version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: creatorhub-postgres
    restart: always
    environment:
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: creatorpass
      POSTGRES_DB: creatorhub
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
